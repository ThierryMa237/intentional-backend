version: "3.9"

services:
  db:
    image: postgres:16
    container_name: intentional-db
    environment:
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: intentional
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: intentional-backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:secret@db:5432/intentional
      SECRET_KEY: un-secret-aleatoire-a-changer-en-production
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data: